name: notiflex
description: NotiFlex
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  awesome_notifications: ^0.10.0
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  flutter:
    sdk: flutter

  flutter_callkit_incoming: ^2.0.4+2
  flutter_dotenv: ^5.2.1
  flutter_dynamic_icon: ^2.1.0
  http: ^1.2.2
  intl: ^0.19.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  timezone: ^0.9.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/platforms/
    - .env
